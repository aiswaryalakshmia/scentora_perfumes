{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scentora | Reset Password</title>
  <link rel="stylesheet" href="{% static 'css/reset_password.css' %}">
</head>
<body>
  <div class="container">
    <h1 class="brand">SCENTORA</h1>

    <div class="card">
      <h2>Reset Password</h2>
      <p class="subtitle">Create a new secure password for your account</p>

      <form method="post">
        {% csrf_token %}
        <div class="input-group">
          <input type="password" id="new-password" name="password" placeholder="New Password" required>
          <span class="toggle-icon" onclick="togglePassword('new-password', this)">
            <img src="{% static 'images/EyeIcon.svg' %}" alt="Show Password">
          </span>
        </div>

        <div class="strength-bar">
          <div id="strength-fill"></div>
        </div>
        <p id="strength-text">Strength: Weak</p>

        <div class="input-group">
          <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm Password" required>
          <span class="toggle-icon" onclick="togglePassword('confirm-password', this)">
            <img src="{% static 'images/HideIcon.svg' %}" alt="Hide Password">
          </span>
        </div>

        <button type="submit">Reset Password</button>
      </form>

      <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
    </div>
  </div>
  <script>
    function togglePassword(inputId, element) {

        const passwordField = document.getElementById(inputId);

        if (passwordField.type === 'password') {

            passwordField.type = 'text';

            element.querySelector('img').src =
                "{% static 'images/HideIcon.svg' %}";

        } else {

            passwordField.type = 'password';

            element.querySelector('img').src =
                "{% static 'images/EyeIcon.svg' %}";
        }

    }
</script>
<script>

const passwordInput =
    document.getElementById('new-password');

const strengthFill =
    document.getElementById('strength-fill');

const strengthText =
    document.getElementById('strength-text');

passwordInput.addEventListener('input', function () {

    const password = this.value;

    let score = 0;

    if (password.length >= 8)
        score++;

    if (/[A-Z]/.test(password))
        score++;

    if (/[0-9]/.test(password))
        score++;

    if (/[^A-Za-z0-9]/.test(password))
        score++;

    if (score <= 1) {

        strengthFill.style.width = '25%';
        strengthFill.style.backgroundColor = 'red';

        strengthText.textContent =
            'Strength: Weak';

    }

    else if (score <= 3) {

        strengthFill.style.width = '60%';
        strengthFill.style.backgroundColor = 'orange';

        strengthText.textContent =
            'Strength: Medium';

    }

    else {

        strengthFill.style.width = '100%';
        strengthFill.style.backgroundColor = 'green';

        strengthText.textContent =
            'Strength: Strong';

    }

});

</script>
