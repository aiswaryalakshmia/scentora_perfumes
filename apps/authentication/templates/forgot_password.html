{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scentora | Forgot Password</title>
  <link rel="stylesheet" href="{% static 'css/forgot_password.css' %}">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon-circle">
        <img src="{% static 'images/unlock-icon.png' %}" alt="Unlock Icon">
      </div>
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your email to receive a verification code</p>

      <form method="post">
        {% csrf_token %}
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="essence@scentora.com" required>
        <button type="submit">Reset Password</button>
      </form>

      <p class="note">We’ll send a one-time password to your email</p>

      <div class="links">
        <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
        <a href="{% url 'signup' %}" class="create-link">Create Account</a>
      </div>
    </div>
  </div>
</body>
</html>
