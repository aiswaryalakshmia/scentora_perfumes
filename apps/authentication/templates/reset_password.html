{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scentora | Reset Password</title>
  <link rel="stylesheet" href="{% static 'css/reset_password.css' %}">
</head>
<body>
  <div class="container">
    <h1 class="brand">SCENTORA</h1>

    <div class="card">
      <h2>Reset Password</h2>
      <p class="subtitle">Create a new secure password for your account</p>

      <form method="post">
        {% csrf_token %}
        <div class="input-group">
          <input type="password" id="new-password" name="password" placeholder="New Password" required>
          <span class="toggle-icon" onclick="togglePassword('new-password', this)">
            <img src="{% static 'images/eye-icon.png' %}" alt="Show Password">
          </span>
        </div>

        <div class="strength-bar">
          <div id="strength-fill"></div>
        </div>
        <p id="strength-text">Strength: Weak</p>

        <div class="input-group">
          <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm Password" required>
          <span class="toggle-icon" onclick="togglePassword('confirm-password', this)">
            <img src="{% static 'images/eye-off-icon.png' %}" alt="Hide Password">
          </span>
        </div>

        <button type="submit">Reset Password</button>
      </form>

      <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
    </div>
  </div>
